name: Migrate D1

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"

jobs:
  migrate:
    name: Apply remote D1 migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Cloudflare D1 database id
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "::error::Set CLOUDFLARE_D1_DATABASE_ID in GitHub Actions secrets."
            exit 1
          fi

          sed -i "s/REPLACE_WITH_CLOUDFLARE_D1_DATABASE_ID/$CLOUDFLARE_D1_DATABASE_ID/g" wrangler.toml

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set CLOUDFLARE_ACCOUNT_ID in GitHub Actions secrets."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set CLOUDFLARE_API_TOKEN in GitHub Actions secrets."
            exit 1
          fi

          pnpm exec wrangler d1 migrations apply akikoma --remote
